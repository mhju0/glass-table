name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build app (simulator, unsigned)
        run: |
          set -o pipefail
          xcodebuild -project GlassTable.xcodeproj -scheme GlassTable \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build | tail -20
      - name: Drills package tests
        run: swift test --package-path GlassTableDrills
