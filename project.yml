name: GlassTable
options:
  bundleIdPrefix: com.michaelju.glasstable
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  GlassTableEngine:
    path: GlassTableEngine
  GlassTableDrills:
    path: GlassTableDrills
targets:
  GlassTable:
    type: application
    platform: iOS
    sources:
      - GlassTable/Sources
      - GlassTable/Resources
    dependencies:
      - package: GlassTableDrills
      - package: GlassTableEngine
    info:
      path: GlassTable/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIAppFonts:
          - Pretendard-Regular.otf
          - Pretendard-SemiBold.otf
          - Pretendard-Bold.otf
        # All colors are hand-tuned for light; declare it so dark mode never half-applies.
        UIUserInterfaceStyle: Light
        # Drill layout (green zone + bottom sheet) is portrait-designed; lock it.
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaelju.glasstable
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
